services:
  - type: web
    name: bugalteriya-bot
    env: python

    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: BOT_TOKEN
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false
